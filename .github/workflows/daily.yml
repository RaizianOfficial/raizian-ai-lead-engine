name: Daily Lead Generation Pipeline

on:
  schedule:
    # 5:00 AM IST = 11:30 PM UTC
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Lead Pipeline
        run: node index.js
        env:
          NODE_ENV: production

          GEMINI_API_KEY: "${{ secrets.GEMINI_API_KEY }}"

          FIREBASE_PROJECT_ID: "${{ secrets.FIREBASE_PROJECT_ID }}"
          FIREBASE_CLIENT_EMAIL: "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
          FIREBASE_PRIVATE_KEY: "${{ secrets.FIREBASE_PRIVATE_KEY }}"

          SMTP_HOST: "${{ secrets.SMTP_HOST }}"
          SMTP_PORT: "${{ secrets.SMTP_PORT }}"
          SMTP_USER: "${{ secrets.SMTP_USER }}"
          SMTP_PASS: "${{ secrets.SMTP_PASS }}"

          EMAIL_TO: "${{ secrets.EMAIL_TO }}"
          EMAIL_FROM: "${{ secrets.EMAIL_FROM }}"

          SERP_API_KEY: "${{ secrets.SERP_API_KEY }}"

          TARGET_CITY: "${{ secrets.TARGET_CITY }}"
          TARGET_NICHE: "${{ secrets.TARGET_NICHE }}"

          DAILY_LEAD_LIMIT: "${{ secrets.DAILY_LEAD_LIMIT }}"
          SCRAPE_LIMIT: "${{ secrets.SCRAPE_LIMIT }}"
          MIN_SCORE_THRESHOLD: "20"
